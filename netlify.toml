[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/v3"
  to = "/tomasq-v3.html"
  status = 200

[[redirects]]
  from = "/v4"
  to = "/index.html"
  status = 200

# ââ Internal-only paths Â· 404 pÃºblicamente (siguen accesibles vÃ­a GitHub) ââ
# Docs de costos, dashboards internos, scripts NO deben filtrarse al cliente.
# Estos archivos viven en el repo para colaboraciÃ³n pero nunca se sirven en
# el dominio pÃºblico.
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

# Custom 404 â Netlify auto-serves /404.html for unmatched paths when present at root
# (no explicit redirect needed, but documenting here for reference)
