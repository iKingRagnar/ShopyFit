[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/v3"
  to = "/tomasq-v3.html"
  status = 200

[[redirects]]
  from = "/v4"
  to = "/index.html"
  status = 200

# Custom 404 — Netlify auto-serves /404.html for unmatched paths when present at root
# (no explicit redirect needed, but documenting here for reference)
