<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF7F0;color:#1a1a1a;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.wrap{max-width:640px}
.bull{width:120px;height:96px;color:#0d0d0e;margin:0 auto 32px;animation:wobble 4s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.code{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.16em;color:#8a8580;text-transform:uppercase;margin-bottom:14px}

h1 .lime{color:#C8F000;-webkit-text-stroke:2px #0d0d0e}
p{font-size:16px;color:#5a5550;line-height:1.6;margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto}
.btns{display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center}
a{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:14px 32px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.p{background:#0d0d0e;color:#FAF7F0;border:1px solid #0d0d0e}
.p:hover{background:#C8F000;color:#0d0d0e;border-color:#C8F000}
.g{color:#0d0d0e;border:1px solid #0d0d0e}
.g:hover{background:#0d0d0e;color:#FAF7F0}
</style>
</head>
