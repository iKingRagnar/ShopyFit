# Inversión LIGERA · Modelo Pre-order / POD

> Reescrito 2026-05-04 con info real del chat con socio. Costo objetivo prenda: $150-200 MXN. PVP: tee $649, cargo $799. Lead time customer: 1-2 semanas. **Cero stock, casi cero contacto con producto.**

---

## Target: morros y morras 15-26 años

> *"Los que no le piensan tanto en precio. Compran calidad, branding y vibra. Se mueven en TikTok + Instagram. Confían en reviews de otros morros antes que en ads tradicionales."*

### Implicaciones operativas

- **TikTok > Instagram > Meta** en presupuesto de ads (orden de prioridad)
- **Reels y TikToks con producto en uso real** (gym, calle, sesión de boxing) son la moneda
- **Influencer micro fitness/streetwear** (1K-50K seguidores) > celebridades
- **WhatsApp** como customer service principal (no email — Gen Z casi no lo usa)
- **Bundle / sets** funcionan mejor que single items (mentalidad de "outfit completo")
- **Drops limitados** generan FOMO real en este demo
- **Pago a meses sin intereses** (Mercado Pago) es casi requisito en MX

### Mix de marketing ajustado al target

| Canal | % del budget | Por qué |
|---|---|---|
| TikTok Ads | 50% | Donde viven realmente |
| Influencer micro (fitness/streetwear) | 25% | Recomendación > publicidad |
| Instagram Reels Ads | 15% | Cross-post de TikToks |
| Meta Feed/Stories | 10% | Retargeting + lookalike audiences |
| Google Search | 0% (mes 1-3) | Brand awareness pre-existe poco |

---

## El concepto

Cliente compra hoy → cobras hoy → mandas la orden a tu maquilador → maquilador produce + envía directo al cliente en 7-14 días → tú nunca tocas la prenda. Pagas al maquilador con la lana del cliente.

## 3 modelos de sourcing (de menos riesgo a más margen)

### A. POD Platform pura (Printful, Tostadora)
Plataforma ya tiene la prenda + se conecta a tu web. Cliente compra, ellos producen + envían automático.

| | |
|---|---|
| Lead time customer | 7-14 días |
| Costo unitario tee | $290-340 MXN |
| Tu margen en tee $649 | ~$280 MXN (43%) |
| MOQ | 1 unidad |
| Inversión inicial | ~$0 (puro digital) |
| **Pro** | Plug & play, automático, cero contacto |
| **Contra** | Margen menor, prendas estándar (no fit oversize propio), packaging genérico |

### B. Batch semanal con maquila local MX *(recomendado)*
Tú abres la web normal (no drop). Acumulas órdenes 7 días. Cada lunes mandas la lista al maquilador. Maquilador produce 5-7 días + envía directo a cada cliente.

| | |
|---|---|
| Lead time customer | 10-14 días |
| Costo unitario tee | $150-200 MXN ← TQ target |
| Tu margen en tee $649 | ~$420 MXN (65%) |
| MOQ típico | 10-15 piezas/lote (semanal) |
| Inversión inicial | ~$15K MXN (samples + foto + IMPI) |
| **Pro** | Margen máximo, fit propio, made in MX, branding completo |
| **Contra** | Si una semana no llegas a MOQ, tienes que esperar a juntar más o absorber el costo de un mini-lote |

### C. Importación China/Bangladesh (mes 6+)
Cuando ya validaron y tienen tracción, importan contenedor pequeño. Calidad alta, costo bajísimo.

| | |
|---|---|
| Lead time producción | 30-45 días |
| Costo unitario tee | $80-120 MXN (FOB) + envío + aduanas |
| Costo final con import | $130-180 MXN |
| Inversión inicial mínima | ~$80-120K MXN (1 contenedor pequeño) |
| **Pro** | Margen brutal (~70%), calidad premium asiática, escalable |
| **Contra** | YA es modelo inventory, no POD. Para mes 6+ con validación. |

## Plan inicial: arrancar con 3 SKUs (recomendado por TQ)

> *"Vamos a empezar despacio, con algunos tres diseños, para ver cómo va pegando la marca"* — TQ

### Los 3 SKUs estratégicos para validar

Eligen **un hero por categoría** para cubrir el wardrobe completo del target:

| SKU | Por qué arrancar con este |
|---|---|
| **Tee Gothic Black 240gsm + bull print** | Producto puerta, precio entrada $649, fácil viralizar en TikTok, alta demanda Gen Z |
| **Hoodie Void Mortal 380gsm** | Statement piece de margen alto, captura compras de invierno + transición SS, look streetwear |
| **Jogger Phantom Toro french terry** | Forma el "outfit completo" con el tee — hace bundle/set vendible naturalmente |

### Por qué esos 3 (no otros)

- **Cubren las 3 zonas del cuerpo** (top + bottom + outerwear) — un cliente puede armar look completo sin pedir 2 marcas
- **Precios escalonados** ($649 / $899 / $849) — entrada barata + upsell + cross-sell
- **Mismo print bull** = un solo art file para los 3 = ahorro en producción de mockups
- **Fáciles de cotizar con maquila local** (no requieren bordado, herrajes especiales, ni materiales raros)
- **Permiten testear 3 swatches de color cada uno** = 9 variaciones para Meta/TikTok ads sin fragmentar producción

### Cronograma de pruebas de tela (4-6 semanas)

> *"Tardaremos en hacer pruebas de las telas y evaluar costos"* — TQ

**Semana 1-2: Discovery**
- TQ contacta 3 maquilas + 2 textileras
- Pide muestras de tela (NO prendas terminadas todavía):
  - 3 swatches de cotton 220-260gsm para tee
  - 2 swatches de french terry 280-320gsm para jogger
  - 2 swatches de fleece 360-400gsm para hoodie
- Costo muestras telas: $200-500 MXN total

**Semana 3-4: Sampling de prendas**
- Maquila finalista hace 1 prenda muestra de cada SKU con tela seleccionada
- Costo samples: ~$1,500-2,500 MXN total
- Lavar 5-10 veces, evaluar:
  - Encogimiento
  - Pilling
  - Resistencia del estampado
  - Comodidad fit

**Semana 5: Decisión + cotización formal**
- Eligen tela final por SKU
- Cotización para batch de 30, 50, 100 piezas (precio baja con volumen)
- Negociación de plazos y pago

**Semana 6: Photoshoot + lanzamiento web**
- Fotos de los 3 SKUs en variantes principales (~9 fotos clave)
- Update web: solo se muestran los 3 SKUs reales, los demás "Coming soon"
- Soft launch a contactos cercanos via WhatsApp para primeras 5-10 ventas

### Inversión inicial AJUSTADA al plan de 3 SKUs

| Item | Costo MXN |
|---|---|
| Muestras de tela (5-7 swatches) | $400 |
| Samples de prendas (3 piezas, 2 rondas) | $4,500 |
| Photoshoot DIY (luces + fondo paper) | $2,000 |

| **Por socio** | **$7,450** |

**Diferencia vs plan completo (8 SKUs):** ~mismo total, pero MUCHO menos riesgo de quemar plata en SKUs que no peguen.

### Después de validar (mes 3-4)

- Si los 3 SKUs venden: agregar 2-3 más por mes (tank, shorts, cap, set)
- Si NO venden: pivotar fit, color o estampado del SKU débil ANTES de expandir
- Métricas para "validó": >40 ventas/mes consistentes en mes 3, recompra >15%, NPS >50

| Producto | YoungLA | Gymshark | Vuori | Lululemon | **TORO KAIZEN** | Δ vs promedio |

| Tee oversize 240gsm | $1,100 | $950 | $1,400 | $1,800 | **$649** | **−51%** |
| Hoodie heavyweight | $2,200 | $1,850 | $2,400 | $3,200 | **$899** | **−63%** |

### Lo que esto comunica

- **Precio 50-65% más bajo** que la competencia americana premium
- **Misma o mejor calidad de tela** (240gsm cotton + elastano = grado YoungLA/Gymshark)
- **Made in México** = no pagas import duties, no esperas 3-4 semanas de envío internacional
- **Hangtag bilingüe MX/JP** = identidad propia, no copy de gringas

### Mensaje de marketing

> *"La tela que YoungLA cobra $1,100, hecha en México, a $649. Sin intermediarios. Sin shipping desde USA. Built different."*

Esto es **el** ángulo de Meta Ads / TikTok desde el día 1. **Comparativa visual lado a lado** con precios de competencia. Brutal para conversion.

### Calidad que hay que cumplir

Para que el pricing competitivo sea **creíble** (no se sienta cheap), las prendas tienen que cumplir:

| Atributo | Mínimo aceptable | Notas |
|---|---|---|
| Gramaje tee | 220-240 gsm | Por debajo se siente "delgado" |
| Composición tee | 100% algodón peinado o 95/5 con elastano | No mezcla cheap |
| Costuras | Doble pespunte en hombros + dobladillos | Estándar oversize premium |
| Estampado | DTF resistente a 30+ lavadas | Pedir muestra de durabilidad |
| Etiqueta | Cosida no transferida | Detalle que se nota |
| Hangtag | Cartón 350+ gsm con cordón | Percepción de unboxing |

**Si TQ en cotización ve gramaje <220gsm o costuras simples, no acepta** — es donde la mayoría de marcas MX nuevas se queman intentando ser baratas.

1. **Modelo legal.** ¿RFC personal de uno, sociedad mercantil (S. de R.L. / S.A.S.) o asociación informal? Afecta IMPI, cuenta bancaria, facturación y blindaje patrimonial.

## I. Convenio escrito entre socios (1 página, firmado)

Aunque no quieran constituir sociedad mercantil el día 1, sí necesitan un **documento de una página firmado entre los dos** antes de meter el primer peso. Vale como evidencia legal en MX si algo se complica, y obliga a hablar las cosas incómodas hoy.

| Cláusula | Contenido mínimo |
|---|---|
| Partes | Nombre completo, RFC, domicilio fiscal de cada socio |
| Objeto | "Operar conjuntamente la marca TORO KAIZEN bajo modelo Batch POD de ropa" |
| Aportaciones | Monto inicial + mensual de cada uno + fechas |
| Reparto de utilidades | % que recibe cada uno + cuándo se distribuye |
| Reparto de pérdidas | Mismo %, sin escapatorias |
| Roles y obligaciones | Lo que se acordó en C.3 (CEO / ops / marketing / diseño) |
| Toma de decisiones | Cómo se rompe empate con 2 socios: (a) escalar a un mentor neutral X, (b) prevalece la opinión del área dueña del tema, (c) se pospone 7 días con investigación adicional — escoger UNA regla |
| Confidencialidad | Lo que se ve en el chat de socios no se cuenta a terceros |
| No competencia | Mientras dura la sociedad + 12 meses post-salida, ninguno arma marca paralela del mismo nicho |
| Propiedad intelectual | Logo, diseños, fotos, base de clientes son **de la sociedad**, no del individuo |
| Salida voluntaria | Aviso 60 días + valuación de su parte (fórmula simple: % × valor de inventario + caja) |
| Salida forzada | Causales: incumplimiento grave, abandono >30 días, conflicto de interés |
| Mediación previa | Antes de demandar, intentar mediación con tercero acordado |

> No requiere notario el día 1, pero sí firmas con tinta y fecha en 2 copias. Tiempo total: 30-45 min con plantilla.

1. **Día 0** (envío): tracking + WhatsApp con foto del paquete saliendo
2. **Día +3** (entrega esperada): "¿Ya llegó? ¿Todo bien?"
3. **Día +14** (después de usar): "¿Cómo te quedó? ¿Una foto para regalarte 10% en tu próxima compra?"
4. **Día +30**: encuesta NPS de 2 preguntas (1-10 + ¿por qué?)

Las respuestas se documentan en una pestaña de Notion. **Cada semana**, los socios revisan el feedback y deciden **1 cambio operativo o de producto** basado en lo que se repite. Si no hay cambio, lo escriben explícito: *"esta semana no cambiamos nada porque feedback fue positivo y consistente"*.

## R. Branding & voice guidelines (decidir antes del lanzamiento)

| Aspecto | Decisión |
|---|---|
| Tono de voz | ¿Brutal/streetwear / aspiracional fitness / técnico premium? |
| Vocabulario SÍ | "morros", "vibra", "built different", "kaizen", "made in MX" |
| Vocabulario NO | Lenguaje corporativo, anglicismos forzados, slang de moda pasajera |
| Emoji policy | ¿Usamos? ¿Cuáles? Consistencia entre socios |
| Modo de tratar al cliente | ¿"Tú" siempre? |
| Crisis communication | Si algo sale mal público, ¿quién responde y en qué tono? |

> Sin esto, un socio responde DMs en tono frío y el otro en tono cuate, y la marca se siente esquizofrénica. Definir + dejar 5 ejemplos de respuestas tipo en un SOP.

## S. Calendario de contenido (primeras 4 semanas)

| Semana | TikTok (4/sem) | IG Reels (3/sem) | IG Feed (5/sem) | Stories (diario) |
|---|---|---|---|---|
| -2 (pre-launch) | Teasers maquila + behind the scenes | Cross-post de TikTok | Mockups + lifestyle | BTS, polls, cuestionarios |
| -1 (pre-launch) | Soft sell + "coming soon" | Cross-post | Producto + paleta de colores | Countdown |
| 1 (launch) | Launch video + 3 angles distintos | Cross-post | Producto en uso real | Reviews de primeros clientes |
| 2 | UGC primeros clientes | Cross-post | Comparativas vs gringas | Retos + tag a friends |

Quién publica qué se asigna en la sección C.3 (roles). Cada socio carga 50% del contenido si quieren paridad de esfuerzo, o uno se hace cargo del 100% si compensa en otra área (ej. el otro lleva ops + finanzas).

## T. Health check del partnership (mensual, primer trimestre crítico)

Cada mes, los socios responden estas preguntas en privado y luego comparten respuestas en la retro:

1. ¿Estoy aportando lo que prometí? (1-10)
2. ¿Mi socio está aportando lo que prometió? (1-10)
3. ¿La comunicación entre nosotros es sana? (1-10)
4. ¿Estoy disfrutando esto? (1-10)
5. ¿Hay algo que me esté guardando que debería decir?

> **Regla de alerta:** si en 2 meses consecutivos cualquier número promedia <6, **agendar conversación seria fuera del ritmo normal**. La mayoría de sociedades fallan no por dinero sino por no hablar de cosas que se van acumulando en silencio.

---

## U. Plan de contingencia personal

Cubrir antes del lanzamiento:

- **Si un socio se enferma 1-2 semanas:** ¿quién cubre sus tareas? ¿Cuál es la lista priorizada de qué SÍ se hace y qué se pausa?
- **Si un socio viaja:** ¿avisa con cuántos días de anticipación? ¿Sigue daily check-in con horario distinto o se pausa?
- **Si un socio tiene problema personal grave** (familiar, salud, etc.): ¿se pausa la sociedad 30 días sin penalización? ¿Se renegocia % temporalmente?
- **Si ambos socios están fuera al mismo tiempo:** ¿hay un tercero (familiar, mentor) con acceso de emergencia a customer service para no perder ventas?

> Discutir esto **antes** de que pase. Cuando ya pasó, la conversación es defensiva.
